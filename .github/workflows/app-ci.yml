name: app-ci (reusable)

# Reusable workflow shared by every app in the komluk org.
# Caller stub (in <app>/.github/workflows/ci.yml):
#
#   on:
#     pull_request:
#     push:
#       branches: [main]
#   jobs:
#     ci:
#       uses: komluk/.github/.github/workflows/app-ci.yml@main
#       with:
#         app-name: promptibus
#         orm: prisma                         # prisma | efcore | none
#         dockerfile: Dockerfile
#         build-target: ""                    # leave empty to build the default (final) stage
#         extra-build-target: migrator        # optional: second target → ghcr.io/<image>-<target>
#       secrets:
#         GHCR_PAT: ${{ secrets.GHCR_PAT }}   # PAT with packages:write — required when caller
#                                             # repo lives outside the komluk GHCR namespace.
#                                             # Within-org repos can omit and rely on GITHUB_TOKEN.

on:
  workflow_call:
    inputs:
      app-name:
        description: "Image name under ghcr.io/komluk/<app-name>"
        required: true
        type: string
      orm:
        description: "ORM to gate schema-vs-migrations check (prisma|efcore|none)"
        required: false
        default: "none"
        type: string
      dockerfile:
        description: "Path to Dockerfile"
        required: false
        default: "Dockerfile"
        type: string
      build-target:
        description: "Primary `--target` for docker build (empty = last stage)"
        required: false
        default: ""
        type: string
      extra-build-target:
        description: "Extra docker stage to build & push as ghcr.io/komluk/<app-name>-<target>"
        required: false
        default: ""
        type: string
      ghcr-namespace:
        description: "GHCR namespace (defaults to komluk)"
        required: false
        default: "komluk"
        type: string
      runs-on:
        description: "Runner label"
        required: false
        default: "ubuntu-latest"
        type: string
    secrets:
      GHCR_PAT:
        description: "PAT for cross-org GHCR push (packages:write). Optional within komluk org."
        required: false

jobs:
  # ──────────────────────────────────────────────────────────────
  # Schema vs migrations — fails the PR if developer edited the
  # schema without generating a migration.
  # ──────────────────────────────────────────────────────────────
  migrations-check:
    if: inputs.orm != 'none'
    name: ${{ inputs.orm }} schema vs migrations
    runs-on: ${{ inputs.runs-on }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: shadow
          POSTGRES_PASSWORD: shadow
          POSTGRES_DB: shadow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      SHADOW_DATABASE_URL: postgresql://shadow:shadow@localhost:5432/shadow
      DATABASE_URL: postgresql://shadow:shadow@localhost:5432/shadow

    steps:
      - uses: actions/checkout@v4

      - name: Prisma — verify migrations match schema
        if: inputs.orm == 'prisma'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Prisma — install + diff
        if: inputs.orm == 'prisma'
        run: |
          npm ci --no-audit --no-fund
          npx prisma migrate diff \
            --from-migrations=prisma/migrations \
            --to-schema=prisma/schema.prisma \
            --exit-code \
            --script

      - name: EF Core — verify migrations match model
        if: inputs.orm == 'efcore'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: EF Core — install tool + check
        if: inputs.orm == 'efcore'
        run: |
          dotnet tool install --global dotnet-ef
          dotnet build -c Release
          # `migrations has-pending-model-changes` exits non-zero on drift (.NET 8+).
          dotnet ef migrations has-pending-model-changes

  # ──────────────────────────────────────────────────────────────
  # Build container image, tag with immutable git SHA, push GHCR.
  # ──────────────────────────────────────────────────────────────
  build-push:
    name: build & push ${{ inputs.app-name }}
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: GHCR login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          NS="${{ inputs.ghcr-namespace }}"
          APP="${{ inputs.app-name }}"
          SHA="${GITHUB_SHA::12}"
          PRIMARY="ghcr.io/${NS}/${APP}"
          {
            echo "primary=${PRIMARY}"
            echo "sha-tag=${PRIMARY}:sha-${SHA}"
            echo "branch-tag=${PRIMARY}:${GITHUB_REF_NAME//\//-}"
          } >> "$GITHUB_OUTPUT"
          if [ -n "${{ inputs.extra-build-target }}" ]; then
            EXTRA="ghcr.io/${NS}/${APP}-${{ inputs.extra-build-target }}"
            echo "extra=${EXTRA}" >> "$GITHUB_OUTPUT"
            echo "extra-sha-tag=${EXTRA}:sha-${SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push primary image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          target: ${{ inputs.build-target }}
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ steps.tags.outputs.sha-tag }}
            ${{ steps.tags.outputs.branch-tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push extra-target image (e.g. migrator)
        if: inputs.extra-build-target != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          target: ${{ inputs.extra-build-target }}
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ steps.tags.outputs.extra-sha-tag }}
            ${{ steps.tags.outputs.extra }}:${{ github.ref_name == github.event.repository.default_branch && 'main' || github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
